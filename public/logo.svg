<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="50%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Smooth Squirel/Rounded Container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Engineering Grid Sub-Lines (Futuristic Vibe) -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />

    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Nested Tech Hexagon -->
  <polygon points="256,110 380,182 380,330 256,402 132,330 132,182" fill="none" stroke="url(#accentGrad)" stroke-width="14" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Outer Orbit Nodes -->
  <circle cx="256" cy="110" r="14" fill="#60a5fa" />
  <circle cx="380" cy="182" r="14" fill="#60a5fa" />
  <circle cx="380" cy="330" r="14" fill="#60a5fa" />
  <circle cx="256" cy="402" r="14" fill="#60a5fa" />
  <circle cx="132" cy="330" r="14" fill="#60a5fa" />
  <circle cx="132" cy="182" r="14" fill="#60a5fa" />

  <!-- Centered Connected Symbol "EF" -->
  <g fill="none" stroke="#ffffff" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
    <!-- Letter E -->
    <path d="M 210,200 L 280,200" />
    <path d="M 210,256 L 270,256" />
    <path d="M 210,312 L 280,312" />
    <path d="M 210,200 L 210,312" />

    <!-- Letter F (Overlapping beautifully or adjacent) -->
    <path d="M 310,200 L 310,312" />
    <path d="M 310,200 L 370,200" />
    <path d="M 310,256 L 360,256" />
  </g>

  <!-- Connecting Node / Link Sparkle -->
  <path d="M 285,256 L 315,256" stroke="#60a5fa" stroke-width="6" stroke-dasharray="4,4" />
  <circle cx="285" cy="256" r="6" fill="#60a5fa" />
  <circle cx="315" cy="256" r="6" fill="#60a5fa" />
</svg>
