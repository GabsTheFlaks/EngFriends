<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 115" width="420" height="115" role="img" aria-label="Eng Friends Logo">
  <defs>
    <!-- Icon background gradient -->
    <radialGradient id="iconBg" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#050d1c"/>
    </radialGradient>
    <!-- Blue accent gradient (wordmark + nodes) -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <!-- Subtle inner shadow for the icon box -->
    <filter id="innerGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset dx="0" dy="1" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
  </defs>

  <!-- ═══════════════ ICON BLOCK ═══════════════ -->
  <!-- Background rounded square -->
  <rect x="7" y="7" width="101" height="101" rx="20" ry="20" fill="url(#iconBg)"/>
  <!-- Thin border -->
  <rect x="7" y="7" width="101" height="101" rx="20" ry="20"
        fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.35"/>

  <!-- Hexagon ring (flat-top, center 57,54, r=38) — engineering motif -->
  <polygon points="95,54 76,87 38,87 19,54 38,21 76,21"
           fill="none" stroke="#3B82F6" stroke-width="0.9" opacity="0.22"/>

  <!-- ── Graduation cap (Lucide-style strokes) ── -->
  <!-- Mortarboard diamond — slightly filled for depth -->
  <polygon points="57,24 81,40 57,56 33,40"
           fill="rgba(255,255,255,0.055)"
           stroke="white" stroke-width="2.4" stroke-linejoin="round"/>

  <!-- Top stud (blue accent) -->
  <circle cx="57" cy="24" r="3" fill="#60A5FA"/>

  <!-- Cap brim arc — subtle, from diamond left to right -->
  <path d="M 36 45 Q 57 66 78 45"
        fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.55"/>

  <!-- Tassel: line + ball from right point -->
  <line x1="81" y1="40" x2="90" y2="53"
        stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="90" cy="57" r="3.5" fill="#60A5FA"/>

  <!-- ── Network nodes — friends/community motif ── -->
  <!-- Triangle of connections -->
  <line x1="41" y1="79" x2="57" y2="88" stroke="#60A5FA" stroke-width="1.4" opacity="0.4"/>
  <line x1="57" y1="88" x2="73" y2="79" stroke="#60A5FA" stroke-width="1.4" opacity="0.4"/>
  <line x1="41" y1="79" x2="73" y2="79" stroke="#60A5FA" stroke-width="1.4" opacity="0.4"/>
  <!-- Node dots -->
  <circle cx="41" cy="79" r="3.5" fill="#60A5FA"/>
  <circle cx="57" cy="88" r="3.5" fill="#60A5FA"/>
  <circle cx="73" cy="79" r="3.5" fill="#60A5FA"/>


  <!-- ═══════════════ WORDMARK ═══════════════ -->
  <!-- "Eng" — heavy, near-black -->
  <text x="127" y="57"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="44" font-weight="800"
        fill="#0F172A" letter-spacing="-1">Eng</text>

  <!-- Thin vertical divider between Eng and Friends -->
  <line x1="225" y1="22" x2="225" y2="68"
        stroke="#CBD5E1" stroke-width="1.2"/>

  <!-- "Friends" — light weight, gradient blue -->
  <text x="237" y="57"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="300"
        fill="url(#blueGrad)" letter-spacing="4">Friends</text>

  <!-- Thin accent underline below wordmark -->
  <line x1="127" y1="68" x2="408" y2="68"
        stroke="url(#blueGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Tagline -->
  <text x="127" y="83"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="9.5" font-weight="400"
        fill="#94A3B8" letter-spacing="2.8">PLATAFORMA PARA ESTUDANTES DE ENGENHARIA</text>
</svg>
